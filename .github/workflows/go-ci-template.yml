name: Shared Go CI Template

on:
  workflow_call:
    inputs:
      go-version:
        type: string
        required: false
        default: '1.25'
      gobuildcommand:
        type: string
        required: false
        default: 'go build -ldflags="-s -w" -o my-go-app main.go'
      # ADD TOGGLES FOR ALL THREE STAGES
      run-build:
        type: boolean
        required: false
        default: true
      run-sa:
        type: boolean
        required: false
        default: true
      run-ut:
        type: boolean
        required: false
        default: true

jobs:
  # ==========================================
  # STAGE 1: BUILD
  # ==========================================
  build:
    name: Build Stage
    runs-on: ubuntu-latest
    if: ${{ inputs.run-build }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Build Application
        run: |
          env CGO_ENABLED=0 GOOS=linux GOARCH=amd64 
          go mod tidy
          go clean -cache
          ${{ inputs.gobuildcommand }}

      - name: Upload Workspace Artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-workspace
          path: .
          retention-days: 1

  # ==========================================
  # STAGE 2: STATIC ANALYSIS (SA)
  # ==========================================
  static-analysis:
    name: SonarQube CLI SA Stage
    runs-on: ubuntu-latest
    # Removed "needs: build" so it can run independently if build is skipped
    if: ${{ inputs.run-sa }}
    steps:
      # Step A: If build ran, download the compiled workspace artifact
      - name: Download Workspace Artifact
        if: ${{ inputs.run-build }}
        uses: actions/download-artifact@v4
        with:
          name: project-workspace
          path: .

      # Step B: If build was skipped, checkout the raw codebase instead
      - name: Checkout code (Fallback)
        if: ${{ !inputs.run-build }}
        uses: actions/checkout@v4

      - name: Run SonarScanner CLI
        run: |
          docker run \
            --rm \
            -v "${{ github.workspace }}:/usr/src" \
            sonarsource/sonar-scanner-cli \
            -Dsonar.host.url="${{ secrets.SONAR_HOST_URL }}" \
            -Dsonar.token="${{ secrets.SONAR_TOKEN }}"

  # ==========================================
  # STAGE 3: UNIT TEST (UT)
  # ==========================================
  unit-test:
    name: Unit Test Stage
    runs-on: ubuntu-latest
    if: ${{ inputs.run-ut }}
    steps:
      - name: Download Workspace Artifact
        if: ${{ inputs.run-build }}
        uses: actions/download-artifact@v4
        with:
          name: project-workspace
          path: .

      - name: Checkout code (Fallback)
        if: ${{ !inputs.run-build }}
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Run Unit Tests
        run: |
          go test -v -race -covermode=atomic -coverprofile=coverage.out ./...
