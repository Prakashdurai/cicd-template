name: Shared Go CI Template

on:
  workflow_call:
    inputs:
      go-version:
        type: string
        required: false
        default: '1.25'
      gobuildcommand:
        type: string
        required: false
        default: 'go build -ldflags="-s -w" -o my-go-app main.go'
      run-build:
        type: boolean
        required: false
        default: true
      run-sa:
        type: boolean
        required: false
        default: true
      run-ut:
        type: boolean
        required: false
        default: true

jobs:
  # ==========================================
  # STAGE 1: ENVIRONMENT SETUP & OPTIONAL BUILD
  # ==========================================
  prepare-and-build:
    name: Prepare Workspace & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          cache: true

      - name: Install dependencies
        run: go mod download

      # This line is conditionally skipped to save time if you only want SA
      - name: Build Binary Application
        if: ${{ inputs.run-build }}
        run: |
          env CGO_ENABLED=0 GOOS=linux GOARCH=amd64 
          go mod tidy
          go clean -cache
          ${{ inputs.gobuildcommand }}

      - name: Upload Clean Workspace Artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-workspace
          path: .
          retention-days: 1

  # ==========================================
  # STAGE 2: STATIC ANALYSIS (SA) 
  # ==========================================
  static-analysis:
    name: SonarQube CLI SA Stage
    runs-on: ubuntu-latest
    needs: prepare-and-build
    if: ${{ inputs.run-sa }}
    steps:
      - name: Download Workspace Artifact
        uses: actions/download-artifact@v4
        with:
          name: project-workspace
          path: .

      - name: Run SonarScanner CLI
        run: |
          docker run \
            --rm \
            -v "${{ github.workspace }}:/usr/src" \
            sonarsource/sonar-scanner-cli \
            -Dsonar.host.url="${{ secrets.SONAR_HOST_URL }}" \
            -Dsonar.token="${{ secrets.SONAR_TOKEN }}"

  # ==========================================
  # STAGE 3: UNIT TEST (UT)
  # ==========================================
  unit-test:
    name: Unit Test Stage
    runs-on: ubuntu-latest
    needs: prepare-and-build
    if: ${{ inputs.run-ut }}
    steps:
      - name: Download Workspace Artifact
        uses: actions/download-artifact@v4
        with:
          name: project-workspace
          path: .

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Run Unit Tests
        run: |
          go test -v -race -covermode=atomic -coverprofile=coverage.out ./...
